name: Check Markdown

# Fast pre-publish gate for the results site. Runs on every push/PR so a
# broken table is caught before `pages.yml` deploys it — cheap enough that
# there's no point scoping it to path changes.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate results markdown
        run: python3 scripts/check_results_md.py
