name: CI

# The workflow always runs so the `CI` summary check always posts a status
# — branch protection needs that. Heavy jobs are gated at the job level
# on whether any non-markdown file changed; md-only PRs skip them and
# the summary still reports success.
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  filter:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.diff.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: diff
        shell: bash
        run: |
          # Determine which files changed on this ref.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed=$(git diff --name-only "$base" "$head")
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          else
            # New branch / first push / shallow — be conservative and run.
            changed="FORCE_RUN"
          fi

          echo "Changed files:"
          echo "$changed" | sed 's/^/  /'

          # "code" = anything not covered by the md/site-only bypass list.
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              FORCE_RUN) code=true; break ;;
              *.md|_layouts/*|_config.yml|scripts/*.py|.github/workflows/check-md.yml|.github/workflows/pages.yml) ;;
              *) code=true; break ;;
            esac
          done <<< "$changed"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "code-affecting change: $code"

  check:
    needs: filter
    if: needs.filter.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            packages: "inferena-harness inferena-candle inferena-burn inferena-inferi inferena-luminal inferena-meganeura"
          - os: macos-latest
            name: macOS
            packages: "inferena-harness inferena-candle inferena-burn inferena-inferi inferena-luminal inferena-meganeura"
          - os: windows-latest
            name: Windows
            # Burn (wgpu bleeding-edge) and Luminal have no Windows CI upstream.
            packages: "inferena-harness inferena-candle inferena-meganeura"
    runs-on: ${{ matrix.os }}
    name: Check (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-${{ matrix.os }}

      - name: Install cargo-gpu and Rust GPU toolchain (for inferi)
        shell: bash
        run: |
          cargo install cargo-gpu --git https://github.com/Rust-GPU/cargo-gpu
          cargo gpu install --auto-install-rust-toolchain \
            --spirv-builder-source https://github.com/Rust-GPU/rust-gpu \
            --spirv-builder-version 6a67e7b5954f37989ad540a555b5d6969073592e

      - name: Check packages
        shell: bash
        run: |
          for pkg in ${{ matrix.packages }}; do
            echo "::group::cargo check -p $pkg"
            cargo check -p "$pkg" || true
            echo "::endgroup::"
          done

  # Smoke test on Linux: Lavapipe (Vulkan SW renderer) + CPU frameworks.
  smoke-test-linux:
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    name: Smoke test (Linux)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke-linux

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools cmake

      - name: Verify Vulkan (Lavapipe)
        run: vulkaninfo --summary || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements-cpu.txt

      - name: Build Rust frameworks
        run: cargo build --release --workspace --exclude inferena-inferi

      - name: Run SmolLM2-135M (CPU frameworks)
        run: ./target/release/inferena --model SmolLM2-135M --frameworks pytorch,candle,luminal,burn --root .
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-linux
          path: results/
          if-no-files-found: ignore

  # Smoke test on macOS: Metal (if available) + CPU frameworks.
  smoke-test-macos:
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: macos-latest
    name: Smoke test (macOS)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke-macos

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements-cpu.txt

      - name: Build Rust frameworks
        run: cargo build --release --workspace --exclude inferena-inferi

      - name: Run SmolLM2-135M
        run: ./target/release/inferena --model SmolLM2-135M --frameworks pytorch,candle,burn --root .
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-macos
          path: results/
          if-no-files-found: ignore

  # Single gate that always runs — mark THIS as the required status check in
  # branch protection. It reports success when every upstream job either
  # succeeded or was cleanly skipped because no code changed.
  ci:
    name: CI
    needs: [filter, check, smoke-test-linux, smoke-test-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        shell: bash
        run: |
          fail=0
          for r in \
              "filter=${{ needs.filter.result }}" \
              "check=${{ needs.check.result }}" \
              "smoke-test-linux=${{ needs.smoke-test-linux.result }}" \
              "smoke-test-macos=${{ needs.smoke-test-macos.result }}"; do
            name="${r%%=*}"
            result="${r#*=}"
            case "$result" in
              success|skipped) echo "✓ $name: $result" ;;
              *) echo "✗ $name: $result"; fail=1 ;;
            esac
          done
          exit $fail
