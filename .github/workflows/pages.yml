name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "_config.yml"
      - "_layouts/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tab includes from model pages
        run: |
          mkdir -p _includes
          for f in models/*.md; do
            name=$(basename "$f" .md | tr 'A-Z' 'a-z')
            # Extract from after "## Results" to before "## Architecture",
            # then from after "## Caveats" to end-of-file.
            python3 -c "
          import sys
          text = open('$f').read()
          out = []
          # Results section (between ## Results and ## Architecture)
          parts = text.split('## ')
          for p in parts:
              if p.startswith('Results'):
                  # Skip the heading line itself
                  out.append(p[len('Results'):].strip())
              elif p.startswith('Caveats'):
                  out.append('**Caveats:** ' + p[len('Caveats'):].strip())
          print('\n\n'.join(out))
          " > "_includes/${name}.md"
            echo "Generated _includes/${name}.md ($(wc -l < "_includes/${name}.md") lines)"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
