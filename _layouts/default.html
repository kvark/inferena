<!doctype html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
      /* Wider content area for tables */
      .wrapper { max-width: 1100px; }
      section { width: auto; max-width: none; }
      /* Tab styling */
      .tabs { display: flex; gap: 0; border-bottom: 2px solid #b5e853; margin: 1em 0 0 0; }
      .tabs input[type="radio"] { display: none; }
      .tabs label {
        padding: 8px 20px; cursor: pointer; font-weight: bold;
        border: 1px solid #ccc; border-bottom: none;
        border-radius: 5px 5px 0 0; background: #eee; color: #555;
        margin-bottom: -2px;
      }
      .tabs input[type="radio"]:checked + label {
        background: #fff; border-color: #b5e853; color: #222;
      }
      .tab-panel { display: none; padding: 1em 0; }
      .tab-panel.active { display: block; }
      /* Table readability */
      table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
      th { background: #f5f5f5; }
      td, th { padding: 5px 8px; border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1 class="header">{{ site.title | default: site.github.repository_name }}</h1>
        <p class="header">{{ site.description | default: site.github.project_tagline }}</p>
        <ul>
          <li><a class="buttons github" href="https://github.com/kvark/infermark">View On GitHub</a></li>
        </ul>
      </header>

      <section>
        {{ content }}
      </section>

      <footer>
        <p><small>Hosted on <a href="https://pages.github.com">GitHub Pages</a> using the Dinky theme</small></p>
      </footer>
    </div>
    <script>
      document.querySelectorAll('.tabs input[type="radio"]').forEach(function(r) {
        r.addEventListener('change', function() {
          document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
          document.getElementById(r.value).classList.add('active');
        });
      });
    </script>
  </body>
</html>
